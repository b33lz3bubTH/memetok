<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Primary Meta Tags -->
    <title>MemeTok | The Ultimate Meme Streaming Platform</title>
    <meta
      name="title"
      content="MemeTok | The Ultimate Meme Streaming Platform"
    />
    <meta
      name="description"
      content="Discover, share, and enjoy the trendiest memes in a fast-paced, vertical video feed. Join the MemeTok community today!"
    />
    <meta
      name="keywords"
      content="meme, tiktok, video, streaming, humor, funny, memetok, viral"
    />
    <meta name="author" content="MemeTok Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://memetok.app/" />
    <meta
      property="og:title"
      content="MemeTok | The Ultimate Meme Streaming Platform"
    />
    <meta
      property="og:description"
      content="Discover, share, and enjoy the trendiest memes in a fast-paced, vertical video feed. Join the MemeTok community today!"
    />
    <meta property="og:image" content="/placeholder.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://memetok.app/" />
    <meta
      property="twitter:title"
      content="MemeTok | The Ultimate Meme Streaming Platform"
    />
    <meta
      property="twitter:description"
      content="Discover, share, and enjoy the trendiest memes in a fast-paced, vertical video feed. Join the MemeTok community today!"
    />
    <meta property="twitter:image" content="/placeholder.svg" />

    <!-- Performance & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent elastic bounce on mobile */
      html,
      body {
        position: fixed;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background-color: #0d0a14; /* Match --theme-background from index.css */
      }
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
